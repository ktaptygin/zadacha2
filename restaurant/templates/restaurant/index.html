{% load static %}
<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Hunger</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Tenor+Sans&display=swap'>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css'>
    <link rel='stylesheet' href="{% static 'restaurant/css/style.css' %}">
</head>
<body>
    <div class='page'>
        <header class='header' id='home'>
            <div class='header__inner'>
                <nav class='header__nav'>
                    <a class='header__nav-link header__nav-link--home' href='#home'>HOME</a>
                    <a class='header__nav-link header__nav-link--about' href='#about'>ABOUT</a>
                    <a class='header__nav-link header__nav-link--team' href='#team'>TEAM</a>
                    <a class='header__nav-link header__nav-link--booking' href='#booking'>BOOKING</a>
                    <a class='header__nav-link header__nav-link--menu' href='#menu'>MENU</a>
                    <a class='header__nav-link header__nav-link--gallery' href='#gallery'>GALERIE</a>
                    <a class='header__nav-link header__nav-link--events' href='#events'>EVENTS</a>
                    <a class='header__nav-link header__nav-link--contact' href='#contact'>CONTACT</a>
                </nav>
                <a class='header__logo' href='#home'>
                    <img class='header__logo-img' src="{% static 'restaurant/images/logo.svg' %}" alt='Hunger logo'>
                </a>
                <p class='header__subtitle'>
                    RESTAURANT
                </p>
                <h1 class='header__title'>
                    HUNGRY PEOPLE
                </h1>
                <div class='header__yellow-line'></div>
                <div class='header__buttons'>
                    <a class='header__button header__button--booking' href='#booking'>
                        BOOK TABLE
                    </a>
                    <a class='header__button header__button--explore' href='#about'>
                        EXPLORE
                    </a>
                </div>
            </div>
        </header>
    </div>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js'></script>
    <script src="{% static 'restaurant/js/main.js' %}"></script>
</body>
</html>
